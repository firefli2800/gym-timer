<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gym Timer</title>
<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #timer {
    font-size: 120px;
    font-weight: bold;
  }
  #phase {
    position: absolute;
    top: 20px;
    font-size: 40px;
  }
</style>
</head>
<body>

<div id="phase"></div>
<div id="timer"></div>

<script>
function updateTimer() {
  const now = new Date();
  const seconds = now.getSeconds();

  let cycle = seconds % 60;

  let displayTime;
  let phaseText;

  if (cycle < 45) {
    // WORK phase
    displayTime = 45 - cycle;
    phaseText = "WORK";
    document.body.style.background = "black";
  } else {
    // REST phase
    displayTime = 60 - cycle;
    phaseText = "REST";
    document.body.style.background = "darkred";
  }

  document.getElementById("timer").innerText = displayTime;
  document.getElementById("phase").innerText = phaseText;
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
