<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gym Sync System</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
}

#video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

#timer {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 80px;
  text-shadow: 0 0 10px black;
}

#round {
  position: absolute;
  top: 110px;
  right: 30px;
  font-size: 40px;
}

#controls {
  position: absolute;
  top: 20px;
  left: 20px;
  display: none;
}
</style>
</head>

<body>

<div id="controls">
  <button onclick="startSession()">START</button>
  <button onclick="stopSession()">STOP</button>
  <button onclick="resetSession()">RESET</button>
  <button onclick="nextSegment()">NEXT</button>
</div>

<video id="video" muted loop autoplay></video>

<div id="timer">45</div>
<div id="round">Round 1</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

console.log("APP STARTED");

// 🔑 URL PARAMETERS
const params = new URLSearchParams(window.location.search);
const isController = params.get("controller") === "true";
const screen = params.get("screen") || "1";

// Show controls only on controller
if (isController) {
  document.getElementById("controls").style.display = "block";
  console.log("Controller mode");
} else {
  console.log("Display mode - Screen:", screen);
}

const firebaseConfig = {
  apiKey: "AIzaSyCamPqjcUH0H4h_n09WX5MYIBUZTOMDpjE",
  authDomain: "gym-sync-c2a06.firebaseapp.com",
  databaseURL: "https://gym-sync-c2a06-default-rtdb.firebaseio.com",
  projectId: "gym-sync-c2a06",
  storageBucket: "gym-sync-c2a06.firebasestorage.app",
  messagingSenderId: "803350986935",
  appId: "1:803350986935:web:1a51d276728d48f3c68d32"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const video = document.getElementById("video");
let interval = null;

// 🎥 LOAD VIDEO BASED ON SCREEN
db.ref("workout").on("value", snapshot => {
  const workout = snapshot.val();
  if (!workout) return;

  const videoURL = workout[screen];

  if (videoURL) {
    console.log("Loading video:", videoURL);
    video.src = videoURL;
  }
});

// 🟢 START
function startSession() {
  if (!isController) return;

  db.ref("session").set({
    startTime: Date.now(),
    status: "running",
    offset: 0
  });
}

// ⛔ STOP
function stopSession() {
  if (!isController) return;

  db.ref("session").once("value").then(snapshot => {
    const data = snapshot.val();
    if (!data) return;

    const elapsed = Date.now() - data.startTime + data.offset;

    db.ref("session").update({
      status: "paused",
      offset: elapsed
    });
  });
}

// 🔁 RESET
function resetSession() {
  if (!isController) return;

  db.ref("session").set({
    startTime: 0,
    status: "stopped",
    offset: 0
  });

  video.pause();
  video.currentTime = 0;
  document.getElementById("timer").innerText = "45";
  document.getElementById("round").innerText = "Round 1";
}

// ⏭️ NEXT
function nextSegment() {
  if (!isController) return;

  db.ref("session").once("value").then(snapshot => {
    const data = snapshot.val();
    if (!data) return;

    db.ref("session").update({
      offset: data.offset + 60
    });
  });
}

// 🔵 LISTENER
db.ref("session").on("value", snapshot => {
  const data = snapshot.val();
  if (!data) return;

  if (interval) clearInterval(interval);

  if (data.status === "running") {
    runSession(data.startTime, data.offset);
  } else {
    video.pause();
  }
});

// 🎯 MAIN LOOP
function runSession(startTime, offset) {

  interval = setInterval(() => {

    const now = Date.now();
    const elapsed = Math.floor((now - startTime + offset) / 1000);

    // Sync video
    video.currentTime = elapsed;
    video.play();

    // Timer
    const cycle = elapsed % 60;
    let timeLeft = cycle < 45 ? 45 - cycle : 60 - cycle;
    document.getElementById("timer").innerText = timeLeft;

    // Round (6 min each, max 3)
    const round = Math.floor(elapsed / 360) + 1;
    const displayRound = Math.min(round, 3);
    document.getElementById("round").innerText = "Round " + displayRound;

  }, 500);
}

// 🔁 AUTO RELOAD EVERY 12 HOURS
setInterval(() => {
  console.log("Auto reload triggered");
  location.reload();
}, 43200000);

</script>

</body>
</html>
